<template>
    <div class="case-form-container">
        <h2 class="form-title">Create New Case</h2>
        
        <lightning-card>
            <div class="slds-p-around_medium">
                <lightning-combobox
                    label="Select Product/Asset"
                    value={selectedAsset}
                    options={assets}
                    onchange={handleAssetChange}
                    placeholder="Choose a product..."
                    required>
                </lightning-combobox>
                
                <template if:true={warrantyMessage}>
                    <div class={warrantyMessageClass}>
                        {warrantyMessage}
                    </div>
                </template>
                
                <lightning-input
                    label="Subject"
                    value={subject}
                    onchange={handleSubjectChange}
                    required>
                </lightning-input>
                
                <lightning-textarea
                    label="Description"
                    value={description}
                    onchange={handleDescriptionChange}
                    rows="4">
                </lightning-textarea>
                
                <template if:true={showPrioritySelection}>
                    <lightning-combobox
                        label="Priority"
                        value={priority}
                        options={priorityOptions}
                        onchange={handlePriorityChange}>
                    </lightning-combobox>
                </template>
                
                <template if:false={showPrioritySelection}>
                    <lightning-input
                        label="Priority"
                        value={priority}
                        readonly>
                    </lightning-input>
                </template>
                
                <div class="slds-m-top_medium">
                    <lightning-button
                        variant="brand"
                        label="Create Case"
                        onclick={handleCreateCase}
                        disabled={isCreateDisabled}>
                    </lightning-button>
                    
                    <lightning-button
                        variant="neutral"
                        label="Cancel"
                        onclick={handleCancel}
                        class="slds-m-left_small">
                    </lightning-button>
                </div>
            </div>
        </lightning-card>
        
        <template if:true={showSuccess}>
            <div class="success-message slds-box slds-theme_success slds-m-top_medium">
                <div class="slds-text-heading_small slds-m-bottom_small">
                    Case {createdCaseNumber} created successfully!
                </div>
                <div class="slds-m-bottom_small">
                    You can track your case from MyCases
                </div>
                <lightning-button
                    variant="brand"
                    label="Visit Cases"
                    onclick={navigateToMyCases}>
                </lightning-button>
            </div>
        </template>
    </div>
</template>
